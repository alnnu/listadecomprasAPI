services:
  api:
    build: .
    ports:
      - 8081:8080
    env_file:
      - .env
    volumes:
      - ./:/usr/src/mymanven
    depends_on:
      - db

  db:
    container_name: laudos-db
    image: postgres
    volumes:
      - listaCompra:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - "5432:5432"

volumes:
  listaCompra:
