spring.application.name=listaComprasApi

spring.datasource.url=${POSTGRES_URL}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.username=${POSTGRES_USER}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=postgresql

# pagination
spring.data.web.pageable.default-page-size=10 
spring.data.web.pageable.max-page-size=20
spring.data.web.pageable.page-parameter=0
spring.data.web.pageable.size-parameter=10
spring.data.web.sort.sort-parameter=createdAt
